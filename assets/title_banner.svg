<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="12" fill="url(#bg)" />

  <!-- Neural Net Connections Graphic -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
    <line x1="80" y1="50" x2="160" y2="110" />
    <line x1="160" y1="110" x2="100" y2="170" />
    <line x1="100" y1="170" x2="80" y2="50" />
    <line x1="160" y1="110" x2="220" y2="60" />
    <line x1="220" y1="60" x2="200" y2="160" />
    <line x1="200" y1="160" x2="100" y2="170" />

    <line x1="720" y1="50" x2="640" y2="110" />
    <line x1="640" y1="110" x2="700" y2="170" />
    <line x1="700" y1="170" x2="720" y2="50" />
    <line x1="640" y1="110" x2="580" y2="60" />
    <line x1="580" y1="60" x2="600" y2="160" />
    <line x1="600" y1="160" x2="700" y2="170" />
  </g>

  <!-- Nodes -->
  <g fill="url(#glow)">
    <circle cx="80" cy="50" r="4" opacity="0.6"/>
    <circle cx="160" cy="110" r="6" opacity="0.8"/>
    <circle cx="100" cy="170" r="5" opacity="0.7"/>
    <circle cx="220" cy="60" r="5" opacity="0.7"/>
    <circle cx="200" cy="160" r="4" opacity="0.6"/>

    <circle cx="720" cy="50" r="4" opacity="0.6"/>
    <circle cx="640" cy="110" r="6" opacity="0.8"/>
    <circle cx="700" cy="170" r="5" opacity="0.7"/>
    <circle cx="580" cy="60" r="5" opacity="0.7"/>
    <circle cx="600" cy="160" r="4" opacity="0.6"/>
  </g>

  <!-- Title Text -->
  <text x="400" y="105" text-anchor="middle" font-family="'Outfit', 'Inter', sans-serif" font-size="42" font-weight="800" fill="url(#glow)" filter="url(#shadow)" letter-spacing="2">
    MACHINE LEARNING SUITE
  </text>

  <!-- Subtitle Text -->
  <text x="400" y="145" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#94a3b8" letter-spacing="1">
    Refactored • Production-Grade • Fully Verified
  </text>
  
  <text x="400" y="170" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="3">
    CLASSIFICATION | REGRESSION | NLP | GAMES
  </text>
</svg>
