<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>

  <rect width="800" height="240" rx="12" fill="url(#bg)" stroke="#334155" stroke-width="1.5" />

  <!-- Grid Cells -->
  
  <!-- Col 1, Row 1: Codebase Structure -->
  <g transform="translate(25, 25)">
    <rect width="230" height="85" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="15" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8" letter-spacing="1">PROJECT STRUCTURE</text>
    <text x="15" y="60" font-family="'Outfit', sans-serif" font-size="22" font-weight="800" fill="#f8fafc">8 Clean Packages</text>
    <text x="15" y="75" font-family="'Inter', sans-serif" font-size="10" font-weight="400" fill="#64748b">reorganized from nested folders</text>
  </g>

  <!-- Col 2, Row 1: Bugs Squashed -->
  <g transform="translate(285, 25)">
    <rect width="230" height="85" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="15" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#f43f5e" letter-spacing="1">BUGS RESOLVED</text>
    <text x="15" y="60" font-family="'Outfit', sans-serif" font-size="22" font-weight="800" fill="#f8fafc">15+ Critical Fixes</text>
    <text x="15" y="75" font-family="'Inter', sans-serif" font-size="10" font-weight="400" fill="#64748b">np.int, joblib &amp; logic bugs resolved</text>
  </g>

  <!-- Col 3, Row 1: Unit Tests -->
  <g transform="translate(545, 25)">
    <rect width="230" height="85" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="15" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#10b981" letter-spacing="1">TEST SUITE STATUS</text>
    <text x="15" y="60" font-family="'Outfit', sans-serif" font-size="22" font-weight="800" fill="#10b981">100% Passed</text>
    <text x="15" y="75" font-family="'Inter', sans-serif" font-size="10" font-weight="400" fill="#64748b">comprehensive automated unit tests</text>
  </g>

  <!-- Col 1, Row 2: Console Shell -->
  <g transform="translate(25, 130)">
    <rect width="230" height="85" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="15" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#818cf8" letter-spacing="1">CENTRAL ENTRYPOINT</text>
    <text x="15" y="60" font-family="'Outfit', sans-serif" font-size="22" font-weight="800" fill="#f8fafc">Interactive CLI</text>
    <text x="15" y="75" font-family="'Inter', sans-serif" font-size="10" font-weight="400" fill="#64748b">unified menu launcher main.py</text>
  </g>

  <!-- Col 2, Row 2: Dynamic Pathing -->
  <g transform="translate(285, 130)">
    <rect width="230" height="85" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="15" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#38bdf8" letter-spacing="1">COMPATIBILITY</text>
    <text x="15" y="60" font-family="'Outfit', sans-serif" font-size="22" font-weight="800" fill="#f8fafc">Multi-Platform</text>
    <text x="15" y="75" font-family="'Inter', sans-serif" font-size="10" font-weight="400" fill="#64748b">dynamic paths for Windows/Linux/macOS</text>
  </g>

  <!-- Col 3, Row 2: Open Source -->
  <g transform="translate(545, 130)">
    <rect width="230" height="85" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="15" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" letter-spacing="1">REPOSITORY LICENSE</text>
    <text x="15" y="60" font-family="'Outfit', sans-serif" font-size="22" font-weight="800" fill="#f8fafc">MIT License</text>
    <text x="15" y="75" font-family="'Inter', sans-serif" font-size="10" font-weight="400" fill="#64748b">standard open-source licensing</text>
  </g>
</svg>
